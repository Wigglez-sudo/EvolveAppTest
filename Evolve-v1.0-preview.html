<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="Evolve">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Evolve">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0C0D11">
<meta name="referrer" content="no-referrer">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="64x64" href="favicon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Evolve</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  /* ── BRUTAL SYSTEM ── pure black / bone white / zero compromise */
  --font-disp:"Playfair Display",Georgia,"Times New Roman",serif;
  --font-disp-spacing:-0.02em;
  --ink:#080808; --ink2:#111111; --surface:#141414; --surface2:#1A1A1A; --surface3:#202020;
  --line:#282828; --line2:#303030;
  --text:#F0EDE8; --muted:#909090; --muted2:#555555;
  /* Single accent: bone white. Used ONLY for primary actions & critical highlights */
  --strength:#F0EDE8; --strength2:#D8D4CE;
  /* Secondary functional colours — muted, never competing */
  --fuel:#A8A8A8; --fuel2:#888888;
  --danger:#CC2200; --gold:#8A7A60; --blue:#4A5568;
  --r:0px; --r-sm:0px; --r-lg:0px;
  --grad-brand:none;
  --grad-str:linear-gradient(180deg,var(--text),var(--strength2));
  --grad-fuel:linear-gradient(180deg,var(--fuel),var(--fuel2));
  --shadow:0 4px 20px rgba(0,0,0,.8);
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-t:env(safe-area-inset-top,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--ink);color:var(--text);
  font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  font-size:16px;line-height:1.45;overscroll-behavior-y:none;-webkit-font-smoothing:antialiased}
html{touch-action:manipulation;-webkit-text-size-adjust:100%}
body{max-width:560px;margin:0 auto;min-height:100vh;position:relative;overflow-x:hidden}
h1,h2,h3,h4{margin:0;font-weight:700}
.disp{font-family:var(--font-disp);font-weight:900;letter-spacing:var(--font-disp-spacing,-.02em);line-height:1.0}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit;font-size:16px}
input:focus,select:focus,button:focus-visible{outline:1px solid var(--text);outline-offset:2px}
a{color:var(--text)}
.num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
.muted{color:var(--muted)}
.tiny{font-size:12px}
.center{text-align:center}
.hidden{display:none!important}

/* ── SPLASH ── */
#splash{position:fixed;inset:0;z-index:200;background:var(--ink);
  display:flex;flex-direction:column;align-items:center;overflow-y:auto;overflow-x:hidden;
  padding:calc(60px + var(--safe-t)) 32px calc(40px + var(--safe-b));text-align:center;
  transition:opacity .4s ease, visibility .4s}
#splash.gone{opacity:0;visibility:hidden;pointer-events:none}
.splash-orb{display:none} /* no glows. black is the statement */
.splash-inner{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;width:100%;max-width:360px;margin:auto 0 0}
.splash-news{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;
  background:transparent;border:1px solid var(--line2);padding:12px 14px;
  color:var(--muted);font-weight:600;font-size:12px;font-family:inherit;margin-bottom:12px;cursor:pointer;
  letter-spacing:.1em;text-transform:uppercase}
.splash-news .news-chev{transition:transform .2s;color:var(--muted2);font-size:11px}
.splash-news.open .news-chev{transform:rotate(180deg)}
.splash-news-body{display:none;width:100%;border:1px solid var(--line);border-top:none;
  padding:14px;margin:-4px 0 8px;text-align:left;font-size:12.5px;line-height:1.6;color:var(--muted);max-height:40vh;overflow:auto}
.splash-news-body.open{display:block}
.splash-news-body b{color:var(--text)}
.splash-logo-img{width:64px;height:64px;display:block;margin:0 auto 32px;border-radius:0;
  box-shadow:none;filter:grayscale(1) contrast(1.2)}
.splash-mark{font-family:var(--font-disp);font-size:clamp(72px,18vw,108px);letter-spacing:-.03em;
  line-height:.95;color:var(--text);font-weight:900}
.splash-tag{font-size:11px;letter-spacing:.3em;color:var(--muted);margin-top:12px;text-transform:uppercase;font-weight:700}
.splash-feats{display:flex;flex-direction:column;gap:0;width:100%;margin:48px 0 40px;border-top:1px solid var(--line)}
.sf{display:flex;align-items:center;gap:16px;text-align:left;font-size:13px;font-weight:600;color:var(--muted);
  border-bottom:1px solid var(--line);padding:14px 0}
.sf span{font-size:14px;width:20px;text-align:center}
.splash-enter{font-family:var(--font-disp);font-size:18px;letter-spacing:.08em;width:100%;
  padding:20px 0;background:var(--text);color:var(--ink);font-weight:900;
  border:none;text-transform:uppercase;transition:transform .1s,opacity .15s}
.splash-enter:active{transform:scale(.99);opacity:.9}
.splash-foot{margin-top:auto;padding-top:32px;color:var(--muted2);font-size:10px;letter-spacing:.2em;text-transform:uppercase;z-index:2;font-weight:700}

/* ── APP SHELL ── */
#app{display:none;flex-direction:column;min-height:100vh;padding-top:var(--safe-t)}
#app.on{display:flex}
.screen{display:none;flex:1;padding:14px 16px calc(150px + var(--safe-b));overflow-x:clip}
.screen.active{display:block;animation:fade .2s ease}
@keyframes fade{from{opacity:0}to{opacity:1}}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 2px 14px}
.topbar .hello{font-size:11px;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;font-weight:700}
.topbar .date{font-family:var(--font-disp);font-size:34px;letter-spacing:-.02em;font-weight:900}
.topbar .av{width:36px;height:36px;border-radius:0;background:var(--text);display:flex;
  align-items:center;justify-content:center;font-family:var(--font-disp);font-size:16px;color:var(--ink);font-weight:900}

.eyebrow{font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--muted);font-weight:700}
.sect-title{font-size:34px;margin:2px 0 14px}
.sect-h{display:flex;align-items:baseline;justify-content:space-between;margin:22px 0 12px}
.sect-h h3{font-family:var(--font-disp);font-size:28px;letter-spacing:-.02em;font-weight:900}
.help-bar{display:flex;align-items:center;justify-content:space-between;width:100%;gap:10px;
  background:var(--surface);border:1px solid var(--line);
  padding:10px 14px;margin:0 0 12px;color:var(--muted);font-size:13px;font-weight:600;transition:transform .1s}
.help-bar:active{transform:scale(.99)}
.help-bar .hb-l{display:flex;align-items:center;gap:8px}
.help-bar .hb-i{color:var(--text);font-size:13px}
.help-bar .hb-go{color:var(--muted2);font-size:16px}
.help-body p{margin:0 0 11px;line-height:1.6;color:var(--muted)}
.help-body b{color:var(--text)}
.help-body .help-lead{color:var(--text);font-weight:600;font-size:14px;margin-bottom:14px;line-height:1.5}
.help-row{display:grid;grid-template-columns:104px 1fr;gap:12px;padding:9px 0;border-top:1px solid var(--line);align-items:start}
.help-row:first-of-type{border-top:none}
.help-row>b{color:var(--text);font-size:13px;font-weight:700;line-height:1.4}
.help-row>span{color:var(--muted);font-size:13px;line-height:1.5}
.help-row>span b{color:var(--text);font-weight:600}

/* cards */
.card{background:var(--surface);border:1px solid var(--line);border-radius:0;padding:16px}
.card+.card{margin-top:1px}
.acc{background:var(--surface);border:1px solid var(--line);border-radius:0;margin-bottom:1px;overflow:hidden}
.acc-head{width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px;background:none;border:none;color:var(--text);padding:16px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;text-align:left;letter-spacing:.05em;text-transform:uppercase}
.acc-head .acc-ic{margin-right:9px}
.acc-head .acc-x{transition:transform .2s;color:var(--muted);font-size:10px;flex:0 0 auto}
.acc-head.open .acc-x{transform:rotate(180deg)}
.acc-head .acc-sub{display:block;font-size:11px;font-weight:500;color:var(--muted);margin-top:2px;text-transform:none;letter-spacing:0}
.acc-body{padding:2px 14px 16px}
.acc-danger{border-color:rgba(204,34,0,.4)}
.acc-danger .acc-head{color:var(--danger)}
.more-prof{display:flex;align-items:center;gap:14px;background:var(--surface);
  border:1px solid var(--line);padding:18px;margin-bottom:1px}
.more-av{width:48px;height:48px;flex:0 0 auto;border-radius:0;background:var(--text);color:var(--ink);
  display:flex;align-items:center;justify-content:center;font-family:var(--font-disp);font-size:22px;font-weight:900}
.more-prof-main{flex:1;min-width:0}
.more-prof-name{font-family:var(--font-disp);font-size:22px;letter-spacing:-.02em;font-weight:900;line-height:1.05}
.more-prof-sub{font-size:11px;color:var(--muted);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:.08em;text-transform:uppercase}
.acc-head .acc-ic{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;
  border-radius:0;margin-right:10px;font-size:13px;background:var(--surface3);vertical-align:middle;border:1px solid var(--line)}
.acc-head .acc-ic.ic-prof,.acc-head .acc-ic.ic-units,.acc-head .acc-ic.ic-prefs,
.acc-head .acc-ic.ic-stats,.acc-head .acc-ic.ic-backup,.acc-head .acc-ic.ic-help{background:var(--surface2)}
.hist-item{border-top:1px solid var(--line)}
.hist-item:first-child{border-top:none}
.hist-head{cursor:pointer}
.hist-head .hist-x{color:var(--muted);font-size:10px;transition:transform .2s;flex:0 0 auto;margin:0 2px}
.hist-body{padding:0 4px 14px 50px}
.hist-date{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin:0 0 9px;font-weight:700}
.hist-ex{display:flex;justify-content:space-between;gap:14px;padding:7px 0;border-top:1px solid var(--line)}
.hist-ex:first-of-type{border-top:none}
.hx-n{font-size:13px;font-weight:600;color:var(--text);min-width:0}
.hx-s{font-size:13px;color:var(--muted);text-align:right;font-variant-numeric:tabular-nums;flex:0 0 auto}
.hist-empty{font-size:13px;color:var(--muted2);padding:4px 0}
.pager{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:13px 2px 2px;border-top:1px solid var(--line);margin-top:6px}
.pager-btn{background:transparent;border:1px solid var(--line2);color:var(--text);border-radius:0;padding:8px 15px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;letter-spacing:.08em;text-transform:uppercase}
.pager-btn:disabled{opacity:.2}
.pager-lab{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums}
.row{display:flex;gap:10px}
.row.wrap{flex-wrap:wrap}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:1px}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:14px 20px;border-radius:0;font-weight:700;font-size:14px;letter-spacing:.06em;text-transform:uppercase;
  background:var(--surface2);border:1px solid var(--line2);color:var(--muted);transition:transform .1s,color .15s,border-color .15s}
.btn:active{transform:scale(.98)}
.btn.block{width:100%}
.btn.str{background:var(--text);color:var(--ink);border:none;color:var(--ink)}
.btn.fuel{background:var(--surface3);color:var(--text);border-color:var(--line2)}
.btn.ghost{background:transparent;border-color:var(--line2)}
.btn.sm{padding:9px 13px;font-size:11px}
.btn.danger{color:var(--danger);border-color:rgba(204,34,0,.35)}
.btn.dfill{background:var(--danger);color:#fff;border:none}
.btn.danger-solid{background:var(--danger);color:#fff;border:none;font-weight:700}
.btn:disabled{opacity:.25;cursor:not-allowed}
.btn.gold{background:transparent;color:var(--gold);border-color:var(--gold)}
.chip{padding:9px 16px;border-radius:0;background:transparent;border:1px solid var(--line2);
  font-weight:700;font-size:12px;color:var(--muted);transition:.15s;white-space:nowrap;letter-spacing:.06em;text-transform:uppercase}
.chip.on{background:var(--text);color:var(--ink);border-color:var(--text)}
.chip.str.on{background:var(--text);color:var(--ink);border-color:var(--text)}
.chip.fuel.on{background:var(--fuel);color:var(--ink);border-color:var(--fuel)}

/* ── INPUTS ── */
.field{margin-bottom:14px}
.field label{display:block;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:7px;font-weight:700}
.input{width:100%;background:var(--ink2);border:1px solid var(--line2);border-radius:0;
  padding:14px;color:var(--text);font-size:16px}
.input::placeholder{color:var(--muted2)}
select.input{appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path d='M1 1l5 5 5-5' stroke='%235A5A5A' stroke-width='1.5' fill='none' stroke-linecap='round'/></svg>");
  background-repeat:no-repeat;background-position:right 16px center;padding-right:40px}
.seg{display:flex;background:var(--ink2);border:1px solid var(--line2);border-radius:0;padding:2px;gap:2px}
.seg button{flex:1;padding:10px;border-radius:0;font-weight:700;color:var(--muted);font-size:12px;letter-spacing:.06em;text-transform:uppercase}
.seg button.on{background:var(--text);color:var(--ink)}
.seg.vstack{flex-direction:column}
.seg.vstack button{width:100%}
.seg.scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.seg.scroll::-webkit-scrollbar{display:none}
.seg.scroll button{flex:0 0 auto;white-space:nowrap;padding:10px 16px}
.logger{display:flex;flex-direction:column;max-height:82vh}
.logger .lg-top{flex:0 0 auto}
.logger .lg-meal{display:flex;flex-wrap:wrap;gap:6px}
.logger .lg-actions{display:flex;gap:8px;margin-bottom:4px}
.logger .lg-cats{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.logger .lg-scroll{flex:1 1 auto;overflow-y:auto;min-height:120px;margin:8px -4px 0;padding:0 4px}
.chip.sm.plus b{color:var(--text);font-weight:800;margin-left:2px}
.iconbtn.lg-adj{opacity:.7}
.lg-plate{flex:0 0 auto;border-top:1px solid var(--line2);margin:8px -16px -16px;padding:12px 16px calc(14px + var(--safe-b));background:var(--surface)}
.lg-plate-empty{text-align:center;padding:10px 4px 2px;line-height:1.5}
.lg-plate-head{display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:12px;margin-bottom:8px;gap:10px;letter-spacing:.1em;text-transform:uppercase}
.lg-plate-head .num{color:var(--muted);font-weight:600;font-size:11px}
.lg-plate-items{max-height:34vh;overflow-y:auto;margin-bottom:10px}
.lg-pi{display:flex;flex-direction:column;padding:7px 0;border-top:1px solid var(--line)}
.lg-pi:first-child{border-top:none}
.lg-pi-row{display:flex;align-items:center;gap:8px}
.lg-pi-main{cursor:pointer}
.lg-pi .fn{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lg-pi .fm{font-size:11px;color:var(--muted)}
.lg-pi-edit{width:100%;margin-top:8px;padding-top:8px;border-top:1px solid var(--line)}
.lg-pi-edit .row.wrap{margin:0 0 8px}
.lg-pi-edit .chip.sm{flex:0 0 auto}
.su-units{display:grid;grid-template-columns:1fr 1fr;gap:1px}

/* progress ring + bars */
.ring-wrap{position:relative;width:170px;height:170px;margin:0 auto}
.ring-wrap .lbl{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-wrap .lbl .big{font-family:var(--font-disp);font-size:48px;line-height:1;font-weight:900}
.ring-wrap .lbl .sub{font-size:10px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase}
.bar{height:2px;border-radius:0;background:var(--line2);overflow:hidden}
.bar>i{display:block;height:100%;border-radius:0;transition:width .5s;background:var(--text)}
.macro{margin-top:12px}
.macro .top{display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px}
.macro .top b{font-weight:700}

/* stat tiles */
.stat{background:var(--surface);border:1px solid var(--line);border-radius:0;padding:14px}
.stat .k{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);font-weight:700}
.stat .v{font-family:var(--font-disp);font-size:42px;line-height:1;margin-top:4px;font-weight:900}
.stat .v small{font-family:Inter;font-size:12px;color:var(--muted);font-weight:600;letter-spacing:0}
.home-glance{cursor:pointer}
.home-glance:active{transform:scale(.99)}

/* list rows */
.lrow{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--line)}
.lrow:last-child{border-bottom:none}
.lrow .ico{width:36px;height:36px;border-radius:0;background:var(--surface2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.lrow .main{flex:1;min-width:0}
.lrow .main .t{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lrow .main .s{font-size:11px;color:var(--muted)}
.lrow .end{text-align:right;flex-shrink:0}
.iconbtn{width:32px;height:32px;border-radius:0;display:flex;align-items:center;justify-content:center;background:var(--surface2);border:1px solid var(--line2);flex-shrink:0}
.iconbtn.info{color:var(--text)}
.iconbtn.star{color:var(--muted2);font-size:16px}
.iconbtn.star.on{color:var(--text);border-color:var(--text)}
.chip.gold-chip{color:var(--muted);border-color:var(--line2)}
.del{color:var(--danger);font-size:18px;padding:4px 8px}

/* muscle group tiles */
.mg-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px}
.mg{position:relative;border-radius:0;padding:20px 16px;min-height:120px;overflow:hidden;
  border:1px solid var(--line);display:flex;flex-direction:column;justify-content:flex-end;
  background:var(--surface);transition:transform .1s}
.mg:active{transform:scale(.98)}
.mg .nm{font-family:var(--font-disp);font-size:28px;letter-spacing:-.02em;position:relative;z-index:2;font-weight:900}
.mg .ct{font-size:9px;color:var(--muted);letter-spacing:.18em;text-transform:uppercase;position:relative;z-index:2;font-weight:700}
.mg .glow{display:none}
.mega-card{position:relative;width:100%;text-align:left;margin-top:1px;border-radius:0;padding:20px;overflow:hidden;
  border:1px solid var(--line);background:var(--surface2);transition:transform .1s}
.mega-card:active{transform:scale(.99)}
.mega-card .mega-glow{display:none}
.mega-card .nm{font-size:26px;letter-spacing:-.02em;line-height:1;font-family:var(--font-disp);font-weight:900}
.mega-card .ct{font-size:11px;color:var(--muted);margin-top:5px;letter-spacing:.1em;text-transform:uppercase}
.mg-step{margin-bottom:18px}
.mg-lab{font-family:var(--font-disp),sans-serif;font-size:20px;letter-spacing:-.02em;color:var(--text);margin-bottom:8px;font-weight:900}
.mg-sub{display:block;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;font-weight:700}
.mg-preview{background:var(--ink2);border:1px solid var(--line);border-radius:0;padding:12px 14px;font-size:13px;color:var(--muted);margin-bottom:6px}

/* env toggle */
.env-row{display:flex;gap:1px;margin:4px 0 18px}
.env-seg{flex:1;display:flex;background:var(--ink2);border:1px solid var(--line2);border-radius:0;padding:2px;gap:2px}
.env-seg button{flex:1;padding:11px;border-radius:0;font-weight:700;color:var(--muted);font-size:11px;letter-spacing:.08em;text-transform:uppercase}
.env-seg button.on{background:var(--text);color:var(--ink)}
.fav-pill{display:flex;align-items:center;gap:6px;padding:0 16px;border-radius:0;border:1px solid var(--line2);color:var(--muted);font-weight:700;background:transparent}
.ihelp{font-size:12px;color:var(--muted);vertical-align:middle}
.fav-grid{display:flex;flex-direction:column;gap:0;max-height:46vh;overflow:auto}
.fav-chip{display:flex;align-items:center;justify-content:space-between;gap:8px;background:var(--surface);border:1px solid var(--line);border-radius:0;padding:10px 12px;font-size:13px;margin-bottom:1px}

/* weekly planner */
.plan-card{background:var(--surface);border:1px solid var(--line);padding:16px;margin-bottom:1px}
.plan-strip{display:flex;gap:1px;margin-top:10px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.plan-day{flex:0 0 auto;min-width:60px;text-align:center;border-radius:0;padding:9px 6px;border:1px solid var(--line);background:var(--ink2)}
.plan-day .dn{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.plan-day .dl{font-size:11px;font-weight:700;margin-top:3px;color:var(--text)}
.plan-day.today{border-color:var(--text)}
.plan-day.rest{opacity:.4}
.plan-day.done{background:var(--surface2);border-color:var(--line2)}
.day-pick{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
.day-pick button{padding:10px 0;border-radius:0;border:1px solid var(--line);background:var(--ink2);font-weight:700;font-size:11px;color:var(--muted)}
.day-pick button.on{background:var(--text);color:var(--ink);border-color:var(--text)}
.coach{background:var(--ink2);border:1px solid var(--line);border-radius:0;padding:12px 14px;font-size:13px;line-height:1.5;color:var(--muted);margin-top:12px}

/* calendar */
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dow{font-size:9px;color:var(--muted);text-align:center;padding-bottom:2px;letter-spacing:.1em;text-transform:uppercase}
.cal-cell{aspect-ratio:1;border-radius:0;background:var(--surface);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;color:var(--muted2);position:relative;border:1px solid transparent}
.cal-cell.has{color:var(--text);cursor:pointer}
.cal-cell.today{border-color:var(--text)}
.cal-dot{width:4px;height:4px;border-radius:0;margin-top:2px;background:var(--text)}
.cal-dot.both,.cal-dot.str,.cal-dot.car{background:var(--text)}
.cal-cell.sched{border-color:var(--line2)}

/* set extras */
.set-block.warmup{opacity:.7;border-style:dashed}
.warm-tag{font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-left:6px}
.rir-row{display:flex;align-items:center;gap:6px;margin-top:8px;flex-wrap:wrap}
.rir-row .rl{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
.rir-chip{padding:5px 9px;border-radius:0;border:1px solid var(--line2);background:var(--ink2);font-size:12px;font-weight:700;color:var(--muted)}
.rir-chip.on{background:var(--text);color:var(--ink);border-color:var(--text)}
.ghost-hint{font-size:10px;color:var(--muted2);margin:2px 0 8px;letter-spacing:.05em;text-transform:uppercase}
.ex-tools{display:flex;gap:1px;flex-wrap:wrap;margin-top:2px}
.ex-tool{font-size:10px;font-weight:700;padding:6px 10px;border-radius:0;border:1px solid var(--line);background:transparent;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
.ss-link{display:flex;justify-content:center;margin:-4px 0 10px}
.ss-link button{font-size:10px;font-weight:700;color:var(--muted);padding:5px 12px;border-radius:0;border:1px solid var(--line)}
.ss-badge{display:inline-block;font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);border:1px solid var(--line);border-radius:0;padding:2px 6px;margin-left:6px}
.ex-card.ss{border-color:var(--line2)}
.plate-vis{display:flex;align-items:center;justify-content:center;gap:2px;flex-wrap:wrap;margin:14px 0}
.plate{display:flex;align-items:center;justify-content:center;border-radius:0;color:var(--ink);font-weight:800;font-size:11px;min-width:28px}
.streak-grid{display:flex;gap:1px}
.streak-tile{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:0;padding:14px;text-align:center}
.streak-tile .big{font-family:var(--font-disp);font-size:38px;line-height:1;font-weight:900}
.theme-row{display:flex;gap:8px;flex-wrap:wrap}
.theme-sw{width:40px;height:40px;border-radius:0;border:1px solid var(--line2)}
.theme-sw.on{border-color:var(--text);box-shadow:0 0 0 1px var(--text)}

/* HOME */
.hero{position:relative;border-radius:0;padding:24px 20px 20px;overflow:hidden;border:1px solid var(--line);
  background:var(--surface)}
.hero-eyebrow{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);font-weight:700}
.hero-title{font-family:var(--font-disp),sans-serif;font-size:44px;letter-spacing:-.03em;line-height:1.0;margin:6px 0;font-weight:900}
.hero-sub{color:var(--muted);font-size:13px;line-height:1.5;margin-bottom:18px;max-width:300px}
.hero-btn{font-size:15px;padding:16px}
.qa-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;margin-top:1px}
.qa{display:flex;flex-direction:column;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--line);
  border-radius:0;padding:14px 4px 12px;font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
.qa .qi{font-size:20px;line-height:1}
.qa .ql{transition:color .15s}
.qa:active{transform:scale(.96)}
.qa.qa-str,.qa.qa-gold,.qa.qa-blue,.qa.qa-fuel{background:var(--surface);border-color:var(--line)}
.qa.qa-str .ql,.qa.qa-gold .ql,.qa.qa-blue .ql,.qa.qa-fuel .ql{color:var(--text)}
.snap{margin-top:1px}
.snap-row{display:flex;justify-content:space-between;text-align:center}
.snap-row>div{flex:1}
.snap-row .sv{font-family:var(--font-disp),sans-serif;font-size:30px;line-height:1;font-weight:900}
.snap-row .sk{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-top:3px}
.cardio-card{margin-top:1px}
.fuel-hero{background:var(--surface);border-radius:0}
.mini-hero{position:relative;border-radius:0;padding:18px;border:1px solid var(--line);margin-bottom:1px;background:var(--surface)}
.mini-hero .mh-t{font-family:var(--font-disp);font-size:22px;letter-spacing:-.02em;margin-bottom:10px;font-weight:900}
.mh-row{display:flex;text-align:center}
.mh-row>div{flex:1}
.mh-row .v{font-family:var(--font-disp);font-size:28px;line-height:1;font-weight:900}
.mh-row .k{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-top:4px}
.mg{min-height:112px}
.mg .go{position:absolute;top:12px;right:14px;z-index:2;font-size:16px;color:var(--muted2)}
.train-sub{color:var(--muted);font-size:12px;margin:-6px 0 14px;letter-spacing:.08em;text-transform:uppercase}
.mg .gi{position:absolute;top:12px;left:14px;z-index:2;font-size:20px}
.preset-scroll{display:flex;gap:1px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:2px 0 6px;margin:0}
.preset-card{flex:0 0 auto;width:120px;text-align:left;background:var(--surface);border:1px solid var(--line);
  border-radius:0;padding:14px 12px}
.preset-card .pi{font-size:18px;margin-bottom:8px}
.preset-card .pn{font-family:var(--font-disp);font-size:20px;letter-spacing:-.02em;line-height:1;font-weight:900}
.preset-card .ps{font-size:9px;color:var(--muted);margin-top:4px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.preset-card .pg{font-size:10px;color:var(--muted2);margin-top:5px;line-height:1.35}
.preset-card:active{transform:scale(.97)}
.macro-rings{display:flex;justify-content:space-around;text-align:center}
.mring{flex:1}
.mr-wrap{position:relative;display:inline-block}
.mr-ic{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:20px;filter:grayscale(1)}
.mr-v{font-weight:800;font-size:15px;margin-top:6px}
.mr-v small{color:var(--muted);font-weight:600;font-size:10px}
.mr-k{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-top:2px;font-weight:700}
.set-eyebrow{font-size:9px;letter-spacing:.2em;color:var(--muted);font-weight:800;margin:20px 4px 8px;text-transform:uppercase}
.set-eyebrow:first-of-type{margin-top:4px}
.cardio-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px}
.cardio-tile{text-align:left;background:var(--surface);border:1px solid var(--line);border-radius:0;padding:14px;position:relative;overflow:hidden}
.cardio-tile::after{display:none}
.cardio-tile .cti{font-size:20px;margin-bottom:8px}
.cardio-tile .ctn{font-weight:700;font-size:13px;line-height:1.25;letter-spacing:.04em}
.cardio-tile .cts{font-size:10px;color:var(--muted);margin-top:5px;letter-spacing:.06em;text-transform:uppercase}
.cardio-tile .per{color:var(--muted2)}
.cardio-tile:active{transform:scale(.98)}
.fin-hero{text-align:center;padding:6px 0 2px}
.fin-check{width:60px;height:60px;border-radius:0;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;
  font-size:26px;font-weight:900;color:var(--ink);background:var(--text);animation:pop .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
.fin-t{font-family:var(--font-disp);font-size:32px;letter-spacing:-.02em;font-weight:900}
.fin-s{color:var(--muted);font-size:12px;margin-top:3px;letter-spacing:.08em;text-transform:uppercase}
.su-hero{text-align:center;padding:4px 0 14px}
.su-ic{width:50px;height:50px;border-radius:0;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:22px;background:var(--text);filter:grayscale(1)}
.su-t{font-family:var(--font-disp);font-size:30px;letter-spacing:-.02em;font-weight:900}
.su-s{color:var(--muted);font-size:12px;line-height:1.5;max-width:280px;margin:5px auto 0;letter-spacing:.04em}
.wf-hero{text-align:center;padding:2px 0 14px}
.wf-ic{width:54px;height:54px;border-radius:0;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:24px;background:var(--text);filter:grayscale(1)}
.wf-t{font-family:var(--font-disp);font-size:28px;letter-spacing:-.02em;font-weight:900}
.wf-s{color:var(--muted);font-size:13px;line-height:1.55;max-width:310px;margin:6px auto 0}
.wf-steps{margin:4px 0 0;padding-left:22px;display:flex;flex-direction:column;gap:10px}
.wf-steps li{font-size:13px;line-height:1.45;color:var(--text);padding-left:4px}
.wf-warn{display:flex;flex-direction:column;gap:12px;background:rgba(204,34,0,.06);border:1px solid rgba(204,34,0,.3);border-radius:0;padding:14px}
.wf-warn-row{display:flex;gap:11px;font-size:13px;line-height:1.5;color:var(--text)}
.wf-warn-row span{flex:1}

/* ── LIVE TRACKER ── */
#live{position:fixed;inset:0;z-index:150;background:var(--ink);display:none;flex-direction:column;padding-top:var(--safe-t)}
#live.on{display:flex}
.live-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 12px;border-bottom:1px solid var(--line)}
.live-head .ttl{font-family:var(--font-disp);font-size:24px;letter-spacing:-.02em;line-height:1;font-weight:900}
.live-prog{padding:12px 16px 4px}
.live-prog .lp-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px}
.live-prog .lp-lab{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);font-weight:700}
.live-prog .lp-num{font-family:var(--font-disp);font-size:18px;color:var(--text);font-weight:900}
.live-prog .bar i{transition:width .35s ease;background:var(--text)}
.exi{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:5px}
.live-body{flex:1;overflow-y:auto;padding:16px 16px 230px}
.ex-card{background:var(--surface);border:1px solid var(--line);border-radius:0;padding:18px;margin-bottom:1px}
.ex-card .eh{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.ex-card .eh .nm{flex:1;font-weight:700;font-size:16px;line-height:1.2;letter-spacing:.02em}
.ex-tip{margin:-6px 0 14px;color:var(--muted);font-size:12px}
.rest-pick{display:flex;flex-direction:column;gap:8px;margin-bottom:18px}
.rest-pick .rp-lab{font-size:9px;letter-spacing:.18em;color:var(--muted);font-weight:700;text-transform:uppercase}
.rp-chips{display:flex;gap:1px;overflow-x:auto}
.rp-chip{flex:1;min-width:52px;padding:11px 6px;border-radius:0;background:var(--surface2);border:1px solid var(--line2);font-weight:700;font-size:13px;color:var(--muted)}
.rp-chip.on{background:var(--text);border-color:var(--text);color:var(--ink)}
.sets-wrap{display:flex;flex-direction:column;gap:1px;margin-bottom:12px}
.set-block{background:var(--ink2);border:1px solid var(--line);border-radius:0;padding:14px}
.set-block.done{border-color:var(--line2);background:var(--surface)}
.set-block .sb-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.set-block .sb-top .sl{font-family:var(--font-disp),sans-serif;font-size:20px;letter-spacing:.02em;color:var(--muted);font-weight:900}
.set-block.done .sb-top .sl{color:var(--text)}
.sb-done{width:40px;height:40px;border-radius:0;background:var(--surface2);border:1px solid var(--line2);
  display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--muted)}
.set-block.done .sb-done{background:var(--text);border-color:var(--text);color:var(--ink)}
.sb-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px}
.sb-complete{width:100%;margin-top:14px;padding:16px;border-radius:0;border:1px solid var(--line2);
  background:transparent;color:var(--muted);font-weight:700;font-size:14px;letter-spacing:.08em;text-transform:uppercase;
  display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .1s}
.sb-complete:active{transform:scale(.99)}
.sb-complete.done{background:var(--text);border-color:var(--text);color:var(--ink)}
.sb-summary{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:2px 2px 0}
.sb-summary .sv{font-family:var(--font-disp),sans-serif;font-size:30px;letter-spacing:-.01em;color:var(--text);line-height:1;font-weight:900}
.sb-summary .sb-rir{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);
  background:transparent;border:1px solid var(--line2);border-radius:0;padding:4px 8px}
.stepper{background:var(--surface);border:1px solid var(--line);border-radius:0;padding:10px 8px}
.stepper .cap{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);text-align:center;margin-bottom:8px;font-weight:700}
.stepper .ctl{display:flex;align-items:center;gap:2px}
.stepper .ctl button{width:38px;height:46px;border-radius:0;background:var(--surface2);border:1px solid var(--line);
  font-size:20px;font-weight:700;color:var(--text);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.stepper .ctl button:active{background:var(--surface3)}
.stepper .ctl input{flex:1;min-width:0;width:40px;background:transparent;border:none;text-align:center;
  font-size:22px;font-weight:800;color:var(--text);font-variant-numeric:tabular-nums;padding:0}
.stepper .ctl input::placeholder{color:var(--muted2);font-weight:600}
.add-set{width:100%;margin-top:2px;border-style:dashed}
.add-ex{margin-top:8px}

.rest-bar{position:fixed;left:0;right:0;bottom:0;max-width:560px;margin:0 auto;
  background:linear-gradient(0deg,var(--ink) 55%,transparent);
  padding:14px 16px calc(16px + var(--safe-b));z-index:160}
.rest-card{background:rgba(14,14,14,.95);border:1px solid var(--line2);border-radius:0;padding:12px 14px;display:flex;align-items:center;gap:14px;box-shadow:0 8px 30px rgba(0,0,0,.8)}
.rest-ring{width:60px;height:60px;flex-shrink:0;position:relative}
.rest-ring .t{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-disp);font-size:22px;font-weight:900}
.rest-card .ri{flex:1}
.rest-card .ri .l{font-size:9px;text-transform:uppercase;letter-spacing:.16em;color:var(--muted);font-weight:700}
.rest-card .ri .b{font-weight:700;font-size:14px}

/* ── NEW LIVE TRACKER CSS ── */
.live-sticky{position:sticky;top:0;z-index:20;background:var(--ink);
  padding:10px 16px 12px;margin:0 -16px 4px;border-bottom:1px solid var(--line)}
.lp-bar-wrap{display:flex;flex-direction:column;gap:6px}
.lp-row{display:flex;justify-content:space-between;align-items:baseline}
.lp-label{font-size:11px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60%;letter-spacing:.04em;text-transform:uppercase}
.lp-count{font-size:10px;color:var(--muted);font-weight:700;white-space:nowrap;letter-spacing:.1em}
.lp-track{height:2px;border-radius:0;background:var(--line2);overflow:hidden}
.lp-track i{display:block;height:100%;background:var(--text);border-radius:0;transition:width .35s ease}
.ex-wrap{position:relative;margin-bottom:1px}
.ex-wrap.linked .ex-card{border-color:var(--line2)}
.ex-wrap.linked::before{content:"";position:absolute;left:-3px;top:16px;bottom:-16px;width:2px;background:var(--muted);opacity:.5}
.ex-wrap.linked-prev::before{top:-16px}
.ss-connector{display:flex;align-items:center;justify-content:center;gap:8px;
  margin:0 0 1px;padding:9px 0;background:var(--surface2);
  font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);font-weight:800;
  white-space:nowrap;overflow:hidden}
.ss-connector .ln{height:1px;flex:0 0 30px;background:var(--line2)}
.ex-card{background:var(--surface);border:1px solid var(--line);border-radius:0;padding:18px;margin-bottom:0}
.ex-card.ss{border-color:var(--line2)}
.ex-card .eh{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.ex-card .eh .nm{flex:1;font-weight:700;font-size:15px;line-height:1.2;cursor:pointer;letter-spacing:.02em}
.eh-actions{display:flex;align-items:center;gap:4px;flex:none}
.eh .more{width:32px;height:32px;border-radius:0;border:1px solid var(--line2);background:transparent;
  color:var(--muted);font-size:16px;font-weight:700;display:grid;place-items:center;flex:none}
.live-note-btn{width:32px;height:32px;border-radius:0;border:1px solid var(--line2);
  background:transparent;color:var(--muted);font-size:14px;display:grid;place-items:center;flex:none;cursor:pointer}
.live-note-btn.has-notes{border-color:var(--text);color:var(--text)}
.sl-row{display:flex;align-items:center;gap:10px;border:1px solid var(--line);background:transparent;
  border-radius:0;padding:11px 14px;margin-bottom:1px;cursor:pointer}
.sl-row.done{border-color:var(--line2);background:var(--surface)}
.sl-row.todo{opacity:.35}
.sl-row.todo:hover{opacity:.6}
.sl-sn{font-family:var(--font-disp);font-size:15px;font-weight:900;min-width:22px;text-align:center}
.sl-row.done .sl-sn{color:var(--text)}
.sl-row.todo .sl-sn{color:var(--muted)}
.sl-val{flex:1;font-size:13px;font-weight:600;letter-spacing:.02em}
.sl-row.done .sl-val{color:var(--muted)}
.sl-row.todo .sl-val{color:var(--muted2);font-size:12px}
.sl-rir-badge{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--muted);border:1px solid var(--line2);border-radius:0;padding:2px 6px;white-space:nowrap}
.sl-chk{width:24px;height:24px;border-radius:0;display:grid;place-items:center;flex:none}
.sl-row.done .sl-chk{background:var(--text);color:var(--ink);font-size:11px;font-weight:900}
.sl-row.todo .sl-chk{border:1px solid var(--line2)}
.sl-active{border:1px solid var(--text);border-radius:0;padding:18px 16px 16px;margin-bottom:1px;background:rgba(240,237,232,.03)}
.sla-label{display:flex;align-items:baseline;gap:10px;margin-bottom:10px}
.sla-num{font-family:var(--font-disp);font-size:24px;color:var(--text);letter-spacing:-.01em;font-weight:900}
.sla-now{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);font-weight:700;
  background:transparent;border:1px solid var(--line2);border-radius:0;padding:3px 8px}
.sla-ghost{font-size:10px;color:var(--muted2);margin-bottom:12px;letter-spacing:.06em;text-transform:uppercase}
.sla-steps{display:grid;grid-template-columns:1fr 1fr;gap:1px;margin-bottom:14px}
.sla-rir-wrap{margin-bottom:14px}
.sla-rir-toggle{display:flex;align-items:center;gap:6px;background:transparent;border:1px solid var(--line2);
  border-radius:0;padding:8px 12px;font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;
  font-family:inherit;cursor:pointer;width:100%;text-align:left}
.sla-rir-toggle.active{border-color:var(--text);color:var(--text)}
.sla-rir-row{display:none;flex-wrap:wrap;gap:1px;padding:10px 0 2px}
.sla-rir-row.open{display:flex}
.rir-chip{padding:7px 12px;border-radius:0;border:1px solid var(--line2);background:transparent;
  font-size:12px;font-weight:700;color:var(--muted);font-family:inherit;cursor:pointer;letter-spacing:.06em}
.rir-chip.on{background:var(--text);border-color:var(--text);color:var(--ink)}
.rir-info-btn{padding:7px 10px;border-radius:0;border:1px solid var(--line2);background:transparent;
  font-size:12px;color:var(--muted);font-family:inherit;cursor:pointer}
.sla-complete{width:100%;padding:18px;border-radius:0;border:1px solid var(--text);
  background:var(--text);color:var(--ink);font-weight:900;font-size:15px;font-family:var(--font-disp);
  letter-spacing:.06em;text-transform:uppercase;display:flex;align-items:center;
  justify-content:center;gap:8px;cursor:pointer;transition:transform .1s,opacity .12s}
.sla-complete:active{transform:scale(.99);opacity:.9}
.ss-foot{margin-top:10px;padding:10px 0 2px;border-top:1px solid var(--line);
  display:flex;justify-content:center;overflow:hidden}
.ss-foot button{font-size:9px;font-weight:800;color:var(--muted);background:transparent;border:0;
  font-family:inherit;cursor:pointer;letter-spacing:.12em;text-transform:uppercase;
  white-space:nowrap;max-width:100%;overflow:hidden;text-overflow:ellipsis;padding:0 4px}
.ghost-hint{font-size:10px;color:var(--muted2);margin:2px 0 10px;letter-spacing:.06em;text-transform:uppercase}

/* flash overlay */
#flash{position:fixed;inset:0;z-index:300;pointer-events:none;opacity:0;background:var(--text)}
#flash.go{animation:flashAnim 1.2s ease}
@keyframes flashAnim{0%,100%{opacity:0}10%,30%,50%{opacity:.6}20%,40%,60%{opacity:0}}

/* modal */
#modalWrap{position:fixed;inset:0;z-index:180;display:none;align-items:flex-end;justify-content:center}
#modalWrap.on{display:flex}
.modal-bg{position:absolute;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(2px)}
.modal{position:relative;width:100%;max-width:560px;max-height:88vh;overflow-y:auto;
  background:var(--surface);border:1px solid var(--line2);border-radius:0;border-bottom:none;
  padding:20px 18px calc(24px + var(--safe-b));animation:sheet .25s cubic-bezier(.2,.8,.2,1)}
@keyframes sheet{from{transform:translateY(100%)}to{transform:none}}
.modal .grab{width:32px;height:3px;border-radius:0;background:var(--line2);margin:-6px auto 16px}
.modal h3{font-family:var(--font-disp);font-size:26px;letter-spacing:-.02em;font-weight:900;margin-bottom:4px}

/* howto */
.howto-block{margin-top:14px}
.howto-block .lab{font-size:9px;letter-spacing:.2em;text-transform:uppercase;font-weight:700;margin-bottom:4px;color:var(--muted)}
.howto-block.setup .lab,.howto-block.move .lab,.howto-block.cue .lab{color:var(--muted)}
.howto-block.avoid .lab{color:var(--danger)}
.howto-block p{margin:0;color:var(--muted);font-size:14px;line-height:1.55}

/* search list */
.search-list{max-height:46vh;overflow-y:auto;margin-top:8px}
.food-opt{display:flex;align-items:center;justify-content:space-between;padding:12px 4px;border-bottom:1px solid var(--line)}
.food-opt .fn{font-weight:600}.food-opt .fm{font-size:11px;color:var(--muted)}

/* badges */
.badge-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px}
.badge{background:var(--surface);border:1px solid var(--line);border-radius:0;padding:14px;text-align:center;opacity:.25;transition:.3s}
.badge.un{opacity:1;border-color:var(--line2)}
.badge .bi{font-size:26px;margin-bottom:6px;filter:grayscale(1)}
.badge.un .bi{filter:none}
.badge .bt{font-weight:700;font-size:12px;letter-spacing:.04em}
.badge .bd{font-size:10px;color:var(--muted);margin-top:2px}

/* chart */
.chart-wrap{width:100%;overflow:hidden}
svg.chart{width:100%;height:auto;display:block}

/* banner */
.banner{background:rgba(240,237,232,.05);border:1px solid var(--line2);border-radius:0;padding:13px 14px;display:flex;gap:12px;align-items:center;margin-bottom:14px}
.banner .bx{flex:1;font-size:12px}.banner .bx b{color:var(--text)}

/* toast */
#toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(110px + var(--safe-b));
  background:var(--surface3);border:1px solid var(--line2);border-radius:0;padding:12px 22px;
  font-weight:700;font-size:12px;letter-spacing:.08em;text-transform:uppercase;z-index:320;opacity:0;transition:.25s;pointer-events:none;text-align:center;max-width:90%}
#toast.on{opacity:1;transform:translateX(-50%) translateY(-6px)}
#toast.has-undo{display:inline-flex;align-items:center;gap:14px;pointer-events:auto}
#toast .toast-undo{background:none;border:0;color:var(--text);font-family:inherit;font-weight:800;font-size:12px;padding:0;cursor:pointer;letter-spacing:.06em}
.modal-top{position:sticky;top:-20px;z-index:8;display:flex;align-items:center;justify-content:center;
  margin:-20px -18px 12px;padding:14px 18px 8px;background:var(--surface)}
.modal-top .grab{width:32px;height:3px;border-radius:0;background:var(--line2);margin:0}
.modal-top .modal-x{position:absolute;right:14px;top:9px;width:32px;height:32px;border-radius:0;
  background:var(--surface2);border:1px solid var(--line2);color:var(--text);font-size:13px;
  display:grid;place-items:center;cursor:pointer;line-height:1}
.modal-top .modal-x:active{transform:scale(.94)}
#kbdDone{position:fixed;left:0;right:0;z-index:400;display:none;justify-content:flex-end;
  background:var(--surface2);border-top:1px solid var(--line2);padding:7px 14px}
#kbdDone.on{display:flex}
#kbdDone button{background:var(--text);color:var(--ink);border:0;border-radius:0;
  font-family:inherit;font-weight:900;font-size:14px;letter-spacing:.06em;padding:8px 22px}
.usuals-rail{display:flex;gap:1px;overflow-x:auto;padding:2px 0 6px;margin:0 -2px;-webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory}
.usuals-rail::-webkit-scrollbar{display:none}
.ucard{flex:none;width:128px;scroll-snap-align:start;background:var(--surface);border:1px solid var(--line);
  border-radius:0;padding:12px;position:relative;cursor:pointer;text-align:left;transition:transform .1s}
.ucard:active{transform:scale(.97)}
.ucard.flash{border-color:var(--text)}
.ucard .uadd{position:absolute;top:9px;right:9px;width:24px;height:24px;border-radius:0;background:var(--text);
  color:var(--ink);font-weight:900;font-size:15px;display:grid;place-items:center}
.ucard .un{font-weight:600;font-size:12px;line-height:1.25;min-height:34px;padding-right:24px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ucard .um{font-size:10px;color:var(--muted);margin-top:7px}
.ucard .up{font-size:10px;color:var(--text);font-weight:700;margin-top:2px}
.ucard.add-tile{display:grid;place-content:center;text-align:center;border-style:dashed;color:var(--muted);background:transparent;min-height:96px}
.ucard.add-tile .plus{font-size:22px;color:var(--muted)}
.mini-add{display:flex;gap:1px;overflow-x:auto;padding:11px 13px 12px;-webkit-overflow-scrolling:touch;background:var(--surface);border-top:1px solid var(--line)}
.mini-add::-webkit-scrollbar{display:none}
.mini-add .lead{flex:none;align-self:center;font-size:9px;text-transform:uppercase;letter-spacing:.14em;color:var(--muted2);font-weight:700;padding-right:2px}
.mini-chip{flex:none;display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--line2);
  border-radius:0;padding:7px 12px;font-size:11px;color:var(--text);white-space:nowrap;font-family:inherit;letter-spacing:.04em}
.mini-chip .mc-plus{color:var(--text);font-weight:900;font-size:13px}

/* bottom nav */
#nav{position:fixed;left:0;right:0;bottom:0;max-width:560px;margin:0 auto;z-index:120;
  background:rgba(8,8,8,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--line);
  display:flex;padding:0 0 var(--safe-b) 0}
#nav button{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--muted2);
  font-family:Inter,-apple-system,sans-serif;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  padding:12px 4px 10px;border-radius:0;transition:color .15s;white-space:nowrap}
#nav button svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
#nav button.on{color:var(--text)}
#nav button.on svg{stroke:var(--text)}
#nav button.fuelTab.on svg{stroke:var(--text)}
#nav button.nav-home{position:relative;flex:0 0 auto;width:60px;padding:0;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
  gap:4px;font-size:9px;background:transparent}
#nav button.nav-home .nav-ic{display:flex;align-items:center;justify-content:center;
  width:44px;height:44px;border-radius:0;background:var(--text);
  border:none;box-shadow:none;transition:transform .12s}
#nav button.nav-home svg{width:22px;height:22px;stroke:var(--ink)}
#nav button.nav-home.on{background:transparent;color:var(--text)}
#nav button.nav-home.on svg{stroke:var(--ink)}
#nav button.nav-home:active .nav-ic{transform:scale(.93)}

.empty{text-align:center;color:var(--muted);padding:34px 14px;font-size:13px;line-height:1.55;
  border:1px solid var(--line);border-style:dashed;background:transparent}
.divider{height:1px;background:var(--line);margin:18px 0}
hr{border:none;border-top:1px solid var(--line);margin:16px 0}
::-webkit-scrollbar{width:0;height:0}

/* saved workout rows */
.fav-wrap+.fav-wrap{border-top:1px solid var(--line)}
.fav-caret{display:inline-block;transition:transform .2s;color:var(--muted);font-size:9px}
.fav-wrap.open .fav-caret{transform:rotate(180deg)}
.fav-exlist{max-height:0;overflow:hidden;transition:max-height .25s ease;padding:0 4px}
.fav-wrap.open .fav-exlist{max-height:480px;padding:2px 4px 10px}
.fav-exrow{display:flex;align-items:center;gap:9px;padding:7px 6px;font-size:13px;color:var(--text);border-top:1px solid var(--line)}
.fav-exn{display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:20px;border-radius:0;background:var(--line2);color:var(--muted);font-size:10px;font-weight:700;flex:0 0 auto}

.portion-chips .chip.on{border-color:var(--text);background:rgba(240,237,232,.1);color:var(--text)}
.live-note{width:100%;margin-top:10px}
.tap-history{cursor:pointer;text-decoration:underline;text-decoration-style:dotted;text-underline-offset:4px}
.hist-repeat{margin-top:12px}
.hist-note{margin-top:10px;padding:10px 12px;border:1px solid var(--line);border-radius:0;background:var(--surface2);font-size:12px;line-height:1.45;color:var(--muted)}
.pref-subhead{margin:16px 2px 10px;padding-top:6px;border-top:1px solid var(--line);font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.18em;color:var(--muted)}
.pref-subhead:first-child{margin-top:2px;border-top:0;padding-top:0}
.fuel-edit-link{font-weight:700;white-space:nowrap;display:inline-flex;align-items:center;gap:4px}
.av.brand-av{width:36px;height:36px;padding:0;border-radius:0;background:rgba(255,255,255,.06);overflow:hidden}
.av.brand-av img{width:100%;height:100%;display:block;border-radius:0;filter:grayscale(1)}
.more-av.logo{width:52px;height:52px;border-radius:0;background:transparent;padding:0;overflow:hidden}
.more-av.logo img{width:100%;height:100%;display:block;border-radius:0;filter:grayscale(1)}
.profile-photo-btn{border:0;cursor:pointer;flex:0 0 auto}
.profile-photo-btn:active{transform:scale(.97)}
#fuelFab{position:fixed;z-index:119;right:max(22px,calc((100vw - 560px)/2 + 22px));
  bottom:calc(80px + var(--safe-b));width:50px;height:50px;border-radius:0;
  background:var(--text);color:var(--ink);
  font-size:28px;font-weight:900;line-height:1;display:flex;align-items:center;justify-content:center;
  border:none;box-shadow:0 4px 20px rgba(0,0,0,.8);
  transition:transform .12s ease, opacity .2s ease}
#fuelFab:active{transform:scale(.9)}
#fuelFab.hidden{display:none}

/* 1RM table */
.rm-table{padding:4px 0}
.rm-row{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;border-top:1px solid var(--line)}
.rm-row:first-child{border-top:none}
.rm-p{color:var(--muted);font-weight:600;font-size:12px;letter-spacing:.06em}
.rm-w{font-weight:700;font-size:14px}

/* progress photos */
.photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px}
.photo-cell{position:relative;border-radius:0;overflow:hidden;background:var(--surface);border:1px solid var(--line)}
.photo-cell img{width:100%;height:160px;object-fit:cover;display:block;filter:grayscale(.4) contrast(1.1)}
.photo-date{position:absolute;left:0;right:0;bottom:0;padding:5px 7px;font-size:9px;font-weight:700;color:var(--text);background:rgba(0,0,0,.8);letter-spacing:.1em;text-transform:uppercase}
.photo-del{position:absolute;top:5px;right:5px;width:24px;height:24px;border-radius:0;border:none;background:rgba(0,0,0,.7);color:var(--text);font-size:11px;display:flex;align-items:center;justify-content:center}

/* routines */
.rt-card{display:flex;align-items:center;gap:10px;padding:13px 14px;background:var(--surface);border:1px solid var(--line);border-radius:0;margin-bottom:1px;cursor:pointer}
.rt-main{flex:1;min-width:0}
.rt-name{font-weight:700;font-size:14px;letter-spacing:.02em}
.rt-sub{font-size:11px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rt-day{background:var(--surface);border:1px solid var(--line);border-radius:0;padding:13px 14px;margin-bottom:1px}
.rt-day-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px}
.rt-day-name{font-weight:700;font-size:14px;letter-spacing:.04em}
.rt-edit-day{background:var(--ink2);border:1px solid var(--line);border-radius:0;padding:11px;margin-bottom:1px}
.rt-tpl-choice{width:100%;text-align:left;padding:14px;border-radius:0;border:1px solid var(--line);background:var(--surface);color:var(--text);margin-bottom:1px;cursor:pointer}
.rt-tpl-choice b{display:block;font-size:15px;font-weight:700;letter-spacing:.02em}
.rt-tpl-choice span{display:block;color:var(--muted);font-size:11px;margin-top:3px;line-height:1.35}
.rt-tpl-choice.blank{border-style:dashed}
.rt-ex-head{font-size:9px;color:var(--muted);font-weight:700;margin-bottom:6px;letter-spacing:.14em;text-transform:uppercase}
.rt-ex-chips{display:flex;flex-wrap:wrap;gap:1px;margin-bottom:2px}
.rt-ex-chip{display:inline-flex;align-items:center;gap:6px;background:var(--surface3);border:1px solid var(--line2);border-radius:0;padding:6px 8px 6px 11px;font-size:11px;font-weight:600}
.rt-ex-x{border:none;background:none;color:var(--muted);font-size:11px;cursor:pointer;padding:0;line-height:1}
.rt-ex-empty{font-size:11px;color:var(--muted);font-style:italic;margin-bottom:2px}
.rt-intro{display:flex;flex-direction:column;gap:14px;margin-bottom:14px}
.rt-intro-step{display:flex;gap:12px;align-items:flex-start}
.rt-intro-n{flex:0 0 24px;width:24px;height:24px;border-radius:0;background:var(--surface2);color:var(--text);font-weight:900;display:flex;align-items:center;justify-content:center;font-size:13px;border:1px solid var(--line)}
.rt-intro-step b{font-size:14px}

/* AI Coach */
.coach-acts{display:flex;gap:1px;margin-bottom:14px}
.coach-acts .btn{flex:1;font-size:11px;padding:12px 8px}
.coach-log{display:flex;flex-direction:column;gap:8px;min-height:120px;max-height:48vh;overflow-y:auto;margin-bottom:12px;padding:2px}
.coach-empty{text-align:center;padding:28px 14px;line-height:1.5;font-size:13px;color:var(--muted)}
.coach-msg{display:flex}
.coach-msg.user{justify-content:flex-end}
.coach-msg.assistant{justify-content:flex-start}
.coach-bubble{max-width:86%;padding:11px 13px;border-radius:0;font-size:13px;line-height:1.55}
.coach-msg.user .coach-bubble{background:var(--text);color:var(--ink);font-weight:600}
.coach-msg.assistant .coach-bubble{background:var(--surface2);border:1px solid var(--line2);color:var(--text)}
.coach-input{display:flex;gap:1px;margin-bottom:10px}
.coach-input .input{flex:1}
.coach-foot{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;padding-top:4px}
.coach-privacy{background:transparent;border:1px solid var(--line2);border-radius:0;padding:14px;margin-bottom:14px;line-height:1.5;font-size:13px}
.coach-privacy p{margin:0 0 10px}
.coach-priv-list{margin:0 0 10px;padding-left:18px;display:flex;flex-direction:column;gap:7px;font-size:12px;color:var(--muted)}
.coach-priv-list b{color:var(--text)}
.linklike{background:none;border:none;color:var(--text);font-weight:700;cursor:pointer;padding:0;text-decoration:underline}

/* update banner */
.update-banner{position:fixed;left:0;right:0;bottom:calc(70px + var(--safe-b));max-width:560px;margin:0 auto;z-index:200;
  display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:0;border-top:1px solid var(--text);
  background:var(--text);color:var(--ink);animation:upd-in .25s ease}
.update-banner span{flex:1;font-size:13px;font-weight:700;line-height:1.3;letter-spacing:.02em}
.update-banner .btn{flex:0 0 auto;background:var(--ink);color:var(--text);border-color:var(--ink)}
.update-banner .upd-x{flex:0 0 auto;background:none;border:none;color:rgba(0,0,0,.6);font-size:13px;cursor:pointer;padding:4px}
@keyframes upd-in{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.install-banner{position:fixed;left:0;right:0;bottom:calc(130px + var(--safe-b));max-width:560px;margin:0 auto;z-index:200;
  display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:0;
  background:var(--surface);color:var(--text);border:1px solid var(--line2);
  box-shadow:0 4px 20px rgba(0,0,0,.8);animation:upd-in .25s ease}
.install-banner span{flex:1;font-size:13px;font-weight:600;line-height:1.3}
.install-banner .btn{flex:0 0 auto}
.install-banner .upd-x{flex:0 0 auto;background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;padding:4px}

/* coach workout card */
.cw-card{width:100%;max-width:100%}
.cw-title{font-weight:900;font-size:15px;margin-bottom:8px;font-family:var(--font-disp);letter-spacing:-.01em}
.cw-list{display:flex;flex-direction:column;gap:0;margin-bottom:12px}
.cw-ex{display:flex;justify-content:space-between;gap:10px;font-size:12px;padding:6px 0;border-bottom:1px solid var(--line)}
.cw-ex:last-child{border-bottom:none}
.cw-exn{flex:1;min-width:0}
.cw-exs{color:var(--muted);font-weight:700;white-space:nowrap}
.cw-acts{display:flex;gap:1px}
.cw-acts .btn{flex:1}
.saved-empty{text-align:center;padding:22px 16px}
.saved-empty-ic{font-size:26px;margin-bottom:8px;opacity:.4;filter:grayscale(1)}
.saved-empty-t{font-weight:900;font-size:15px;margin-bottom:6px;font-family:var(--font-disp)}
.saved-empty-s{color:var(--muted);font-size:12px;line-height:1.5}
.fav-src{display:inline-block;margin-left:8px;font-size:9px;font-weight:700;color:var(--muted);vertical-align:middle;letter-spacing:.08em;text-transform:uppercase}
.cg-label{font-size:9px;font-weight:700;letter-spacing:.18em;color:var(--muted);margin:0 0 9px;text-transform:uppercase}
.cg-groups{display:flex;flex-wrap:wrap;gap:1px;margin-bottom:18px}
.cg-chip{padding:10px 16px;border-radius:0;border:1px solid var(--line2);background:transparent;
  color:var(--muted);font-weight:700;font-size:12px;cursor:pointer;letter-spacing:.06em;text-transform:uppercase}
.cg-chip.on{background:var(--text);border-color:var(--text);color:var(--ink)}
.cg-size{display:flex;gap:1px}
.cg-seg{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:11px 6px;border-radius:0;
  border:1px solid var(--line2);background:transparent;color:var(--muted);font-weight:700;font-size:13px;cursor:pointer;letter-spacing:.04em}
.cg-seg small{font-size:9px;font-weight:700;color:var(--muted2);letter-spacing:.1em;text-transform:uppercase}
.cg-seg.on{background:var(--text);color:var(--ink);border-color:var(--text)}
.cg-seg.on small{color:rgba(8,8,8,.6)}
.cw-retry{width:100%}
.cw-retry-t{font-weight:700;font-size:13px;margin-bottom:6px;letter-spacing:.04em}
